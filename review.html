<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">

  <meta name="theme-color" content="#2457f5">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <div class="app-shell editorial-shell">
    <header class="page-header editorial-header">
      <a class="back-link" href="index.html">Dashboard</a>
