<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz | Avocatura Trainer</title>
  <meta name="theme-color" content="#2457f5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Avocatura">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="quiz">
  <div class="app-shell app-shell-quiz">
    <header class="quiz-header">
      <a class="back-link" href="index.html">Dashboard</a>
      <div class="quiz-header-copy">
        <p class="eyebrow">Quiz activ</p>
        <p class="quiz-header-note">Antrenament individual, intrebare cu intrebare</p>
      </div>
    </header>

    <main class="quiz-layout">
      <section class="question-card">
        <div class="quiz-question-shell">
          <div class="quiz-progress-block" aria-label="Progres quiz">
            <div class="quiz-progress-head">
              <span class="quiz-progress-label">Progres sesiune</span>
              <span id="quiz-progress" class="quiz-progress-value">1 / 20</span>
            </div>
            <div class="quiz-progress-track">
              <div id="quiz-progress-bar" class="quiz-progress-bar"></div>
            </div>
          </div>
          <h1 id="question-text">Se incarca intrebarea...</h1>
          <p id="question-details" class="support-text quiz-details"></p>

          <form id="quiz-form" class="options-list">
            <label class="option-card">
              <input type="radio" name="answer" value="A">
              <span class="option-content"><strong class="option-key">A</strong><span id="option-a"></span></span>
            </label>
            <label class="option-card">
              <input type="radio" name="answer" value="B">
              <span class="option-content"><strong class="option-key">B</strong><span id="option-b"></span></span>
            </label>
            <label class="option-card">
              <input type="radio" name="answer" value="C">
              <span class="option-content"><strong class="option-key">C</strong><span id="option-c"></span></span>
            </label>
          </form>

          <div id="feedback-panel" class="feedback-panel hidden"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="pwa.js"></script>
  <script src="questions-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
